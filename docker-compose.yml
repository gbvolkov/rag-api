x-app-environment: &app-environment
  DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/rag_api
  REDIS_URL: redis://redis:6379/0
  OBJECT_STORE_BACKEND: minio
  OBJECT_STORE_BUCKET: rag-api-artifacts
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_SECURE: "false"
  QDRANT_URL: http://qdrant:6333
  DEFAULT_INDEX_PROVIDER: qdrant
  FEATURE_ENABLE_GRAPH: ${FEATURE_ENABLE_GRAPH:-false}
  FEATURE_ENABLE_RAPTOR: ${FEATURE_ENABLE_RAPTOR:-false}
  FEATURE_ENABLE_MINER_U: ${FEATURE_ENABLE_MINER_U:-false}
  FEATURE_ENABLE_LLM: ${FEATURE_ENABLE_LLM:-false}
  WORKER_ENABLED: ${WORKER_ENABLED:-true}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_API_KEY_PERSONAL: ${OPENAI_API_KEY_PERSONAL:-}
  MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
  YA_API_KEY: ${YA_API_KEY:-}
  YA_FOLDER_ID: ${YA_FOLDER_ID:-}
  GRAPH_BACKEND_DEFAULT: neo4j
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: neo4jpassword
  NEO4J_DATABASE: neo4j
  HF_HOME: /cache/huggingface
  TRANSFORMERS_CACHE: /cache/huggingface/transformers
  SENTENCE_TRANSFORMERS_HOME: /cache/sentence-transformers
  PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

x-app-depends-on: &app-depends-on
  - postgres
  - redis
  - minio
  - qdrant
  - neo4j

x-app-cache-volumes: &app-cache-volumes
  - hf_cache:/cache/huggingface
  - sentence_transformers_cache:/cache/sentence-transformers
  - playwright_cache:/ms-playwright

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  api:
    image: rag-api:dev
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - sh
      - -c
      - python -m playwright install chromium && uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on: *app-depends-on
    environment: *app-environment
    volumes: *app-cache-volumes
    ports:
      - "8000:8000"

  worker:
    image: rag-api:dev
    command:
      - sh
      - -c
      - python -m playwright install chromium && celery -A app.workers.celery_app.celery_app worker -l INFO
    depends_on: *app-depends-on
    environment: *app-environment
    volumes: *app-cache-volumes

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  neo4j_data:
  hf_cache:
  sentence_transformers_cache:
  playwright_cache:
